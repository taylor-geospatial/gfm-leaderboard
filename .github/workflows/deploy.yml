name: Deploy to Cloudflare Pages

# When `app` is merged into `main`, flip the trigger branch below to [main]
# and update the Cloudflare project's production branch via the CF dashboard
# (or `wrangler pages project ...`). Nothing else needs to change.
on:
  push:
    branches: [app]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Build
        working-directory: app
        run: bun run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy app/dist --project-name=gfm-leaderboard --branch=app
